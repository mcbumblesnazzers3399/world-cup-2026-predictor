name: Keep Streamlit Alive

on:
  schedule:
    - cron: '0 */10 * * *' # Runs automatically every 10 hours
  workflow_dispatch:      # Allows you to trigger it manually from GitHub if needed

jobs:
  ping:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Gives the bot permission to push changes
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Make Empty Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "🤖 Keep-alive heartbeat"
          git push
